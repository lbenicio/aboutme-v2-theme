{{ define "main" }}
<section>
  <h1>{{ .Title }}</h1>
  {{ $p := .Paginate .Pages }}
  <ul class="post-list">
    {{ range $p.Pages }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      {{ with .Date }}<span class="meta">
        · {{ . | time.Format "2006-01-02" }}</span
      >{{ end }} {{ with .Params.description }}
      <p>{{ . }}</p>
      {{ end }}
    </li>
    {{ end }}
  </ul>
  {{ partial "pagination.html" . }}
</section>
{{ end }}
