{{ define "main" }}
<section {{ partial "obfuscate/cls" "flex flex-col items-center justify-center py-16" | safeHTMLAttr }}>
  <h1 {{ partial "obfuscate/cls" "text-5xl md:text-6xl font-extrabold text-accent mb-4" | safeHTMLAttr }}>404</h1>
  <p {{ partial "obfuscate/cls" "text-lg md:text-xl text-muted-foreground mb-6" | safeHTMLAttr }}>Page not found</p>
  <div {{ partial "obfuscate/cls" "max-w-xl text-center text-muted-foreground mb-8" | safeHTMLAttr }}>
    Sorry, the page you're looking for doesn't exist or has been moved.<br />
    If you think this is an error, please <a href="/contact/" {{ partial "obfuscate/cls" "underline" | safeHTMLAttr }}>contact me</a>.
  </div>
  <a href="/" {{ partial "obfuscate/cls" "inline-block px-6 py-2 rounded bg-accent text-white font-semibold shadow hover:bg-accent/80 transition" | safeHTMLAttr }}>Go to Home</a>
</section>
{{ end }}
